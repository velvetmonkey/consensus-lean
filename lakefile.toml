name = "consensus-lean"
defaultTargets = ["Consensus", "axiom_check"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "Consensus"
globs = ["Consensus.+"]

[[lean_lib]]
name = "Test"
globs = ["Test.+"]

[[lean_exe]]
name = "checker"
root = "CheckerMain"

[[lean_exe]]
name = "axiom_check"
root = "Test.Axioms"
